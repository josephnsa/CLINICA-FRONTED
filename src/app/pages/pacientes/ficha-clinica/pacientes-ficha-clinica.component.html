<div class="flex flex-col gap-4">

  <div class="flex flex-wrap items-center gap-4" [formGroup]="searchForm">
    <mat-form-field appearance="outline">
      <mat-label>Buscar paciente</mat-label>
      <input matInput placeholder="Nombre o DNI" formControlName="search" (keyup.enter)="onSearch()" />
    </mat-form-field>
    <button mat-flat-button color="primary" (click)="onSearch()">Buscar</button>
  </div>

  <table mat-table [dataSource]="patients" class="w-full">
    <ng-container matColumnDef="docNumber">
      <th mat-header-cell *matHeaderCellDef>N° Documento</th>
      <td mat-cell *matCellDef="let row">{{ row.docType }} {{ row.docNumber }}</td>
    </ng-container>
    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef>Paciente</th>
      <td mat-cell *matCellDef="let row">{{ row.firstName }} {{ row.lastName }}</td>
    </ng-container>
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <button mat-button color="primary" (click)="selectPatient(row)">Ver ficha</button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="['docNumber','fullName','select']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['docNumber','fullName','select']"></tr>
  </table>

  <ng-container *ngIf="selectedPatient && showForm">
    <h3 class="text-lg font-medium mt-4">
      Ficha clínica — {{ selectedPatient.firstName }} {{ selectedPatient.lastName }}
    </h3>

    <form [formGroup]="profileForm" class="flex flex-col gap-4">
      <mat-form-field appearance="outline">
        <mat-label>Alergias</mat-label>
        <textarea matInput formControlName="allergies" rows="2"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Antecedentes personales</mat-label>
        <textarea matInput formControlName="personalHistory" rows="2"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Antecedentes familiares</mat-label>
        <textarea matInput formControlName="familyHistory" rows="2"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Antecedentes quirúrgicos</mat-label>
        <textarea matInput formControlName="surgicalHistory" rows="2"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Medicamentos actuales</mat-label>
        <textarea matInput formControlName="currentMeds" rows="2"></textarea>
      </mat-form-field>

      <div class="flex justify-end">
        <button mat-flat-button color="primary" (click)="save()">Guardar cambios</button>
      </div>
    </form>
  </ng-container>

</div>
