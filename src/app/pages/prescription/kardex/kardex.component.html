<div class="flex flex-col gap-5">
  <div class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
    <div class="mb-3">
      <h2 class="text-xl font-semibold text-gray-900">Farmacia - Kardex por paciente</h2>
      <p class="text-sm text-gray-500">Consulta historico de prescripciones y estados por paciente.</p>
    </div>
    <div class="flex flex-wrap gap-3 items-center" [formGroup]="searchForm">
      <app-patient-autocomplete-field
        class="min-w-[280px] flex-1"
        label="Paciente"
        [idControl]="$any(searchForm.controls.patientId)"
      />
      <button mat-flat-button color="primary" (click)="search()" [disabled]="isLoading">
        {{ isLoading ? 'Buscando...' : 'Buscar' }}
      </button>
    </div>
  </div>

  <div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
    <table mat-table [dataSource]="kardex" class="w-full">
    <ng-container matColumnDef="medicationName">
      <th mat-header-cell *matHeaderCellDef>Medicamento</th>
      <td mat-cell *matCellDef="let row">{{ row.medicationName }}</td>
    </ng-container>
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef>Acción</th>
      <td mat-cell *matCellDef="let row">
        <span class="text-sm px-2 py-1 rounded"
          [ngClass]="{
            'bg-blue-100 text-blue-700': row.action === 'PRESCRIBED',
            'bg-green-100 text-green-700': row.action === 'DISPENSED',
            'bg-amber-100 text-amber-700': row.action === 'SUSPENDED',
            'bg-gray-100 text-gray-700': row.action === 'COMPLETED'
          }">
          {{ row.action }}
        </span>
      </td>
    </ng-container>
    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef>Cantidad</th>
      <td mat-cell *matCellDef="let row">{{ row.quantity ?? '-' }}</td>
    </ng-container>
    <ng-container matColumnDef="recordedAt">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let row">{{ row.recordedAt | date:'dd/MM/yyyy HH:mm' }}</td>
    </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <div *ngIf="kardex.length === 0" class="text-center text-gray-500 py-8">
      Selecciona un paciente para ver el kardex.
    </div>
  </div>

</div>
