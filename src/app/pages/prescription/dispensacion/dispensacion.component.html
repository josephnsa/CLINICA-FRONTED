<div class="flex flex-col gap-5">
  <div class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
    <div class="mb-3">
      <h2 class="text-xl font-semibold text-gray-900">Farmacia - Dispensacion</h2>
      <p class="text-sm text-gray-500">Busca recetas activas por paciente y ejecuta la dispensacion.</p>
    </div>
    <div class="flex flex-wrap gap-3 items-center" [formGroup]="searchForm">
      <app-patient-autocomplete-field
        class="min-w-[280px] flex-1"
        label="Paciente"
        [idControl]="$any(searchForm.controls.patientId)"
      />
      <button mat-flat-button color="primary" (click)="onSearch()">Buscar</button>
    </div>
  </div>

  <div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
    <table mat-table [dataSource]="prescriptions" class="w-full">
    <ng-container matColumnDef="patientName">
      <th mat-header-cell *matHeaderCellDef>Paciente</th>
      <td mat-cell *matCellDef="let row">{{ displayPatientName(row) }}</td>
    </ng-container>
    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let row">{{ row.createdAt | date:'dd/MM/yyyy' }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span class="text-sm px-2 py-1 rounded bg-green-100 text-green-700">
          {{ row.status }}
        </span>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acción</th>
      <td mat-cell *matCellDef="let row">
        <button mat-flat-button color="primary"
          (click)="dispense(row)"
          [disabled]="isDispensing === row.id">
          {{ isDispensing === row.id ? 'Dispensando...' : 'Dispensar' }}
        </button>
      </td>
    </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <div *ngIf="prescriptions.length === 0" class="text-center text-gray-500 py-8">
      No hay recetas activas pendientes de dispensar.
    </div>
  </div>

</div>
