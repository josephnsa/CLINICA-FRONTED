<div class="flex flex-col gap-4">

  <div class="flex justify-between items-center">
    <h2 class="text-xl font-semibold">Recetas</h2>
    <button mat-flat-button color="primary" (click)="openForm()">+ Nueva receta</button>
  </div>
<div class="flex gap-3 items-center mb-4" [formGroup]="searchForm">
  <mat-form-field appearance="outline">
    <mat-label>Patient ID</mat-label>
    <input matInput formControlName="patientId" placeholder="UUID del paciente" />
  </mat-form-field>
  <button mat-flat-button color="primary" (click)="onSearch()">Buscar</button>
</div>
  <table mat-table [dataSource]="prescriptions" class="w-full">
    <ng-container matColumnDef="patientName">
      <th mat-header-cell *matHeaderCellDef>Paciente</th>
      <td mat-cell *matCellDef="let row">{{ row.patientName }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">{{ row.status }}</td>
    </ng-container>
    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let row">{{ row.createdAt | date:'dd/MM/yyyy' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <span class="text-sm px-2 py-1 rounded"
          [ngClass]="{
            'bg-green-100 text-green-700': row.status === 'ACTIVE',
            'bg-blue-100 text-blue-700': row.status === 'DISPENSED',
            'bg-red-100 text-red-700': row.status === 'CANCELLED'
          }">
          {{ row.status }}
        </span>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-card *ngIf="showForm" class="mt-4">
    <mat-card-title>Nueva receta</mat-card-title>
    <mat-card-content>
      <form [formGroup]="createForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
        <mat-form-field appearance="outline">
          <mat-label>Patient ID</mat-label>
          <input matInput formControlName="patientId" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Appointment ID</mat-label>
          <input matInput formControlName="appointmentId" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Medication ID</mat-label>
          <input matInput formControlName="medicationId" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Cantidad</mat-label>
          <input matInput type="number" formControlName="quantity" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Dosis</mat-label>
          <input matInput formControlName="dosage" placeholder="Ej: 500mg" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Frecuencia</mat-label>
          <input matInput formControlName="frequency" placeholder="Ej: cada 8 horas" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="md:col-span-2">
          <mat-label>Duración</mat-label>
          <input matInput formControlName="duration" placeholder="Ej: 7 días" />
        </mat-form-field>
      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button (click)="cancel()">Cancelar</button>
      <button mat-flat-button color="primary" (click)="save()" [disabled]="isSaving">
        Guardar
      </button>
    </mat-card-actions>
  </mat-card>

</div>
