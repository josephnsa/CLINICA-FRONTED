<div class="hci-mod hc-page flex flex-col gap-5">
  <header class="hci-mod__hero">
    <div class="hci-mod__titles">
      <h1 class="hci-mod__title">Admisión / Check-in</h1>
      <p class="hci-mod__subtitle">Localiza la cita del paciente y confirma su llegada al consultorio.</p>
    </div>
  </header>

  <div class="hci-mod__filters module-filter-bar" [formGroup]="searchForm">
    <div class="filter-row hci-mod__filter-row flex gap-3 items-center flex-wrap">
    <app-patient-autocomplete-field
      class="w-full max-w-[520px]"
      label="Paciente"
      [idControl]="$any(searchForm.controls.patientId)"
    />
    <button mat-flat-button color="primary" (click)="onSearch()">Buscar</button>
    </div>
  </div>

  <div class="hci-mod-table-wrap module-table-wrap">
  <table mat-table [dataSource]="appointments" class="w-full">
      <ng-container matColumnDef="patientName">
        <th mat-header-cell *matHeaderCellDef>Paciente</th>
        <td mat-cell *matCellDef="let row">{{ displayPatientName(row) }}</td>
      </ng-container>
      <ng-container matColumnDef="startTime">
        <th mat-header-cell *matHeaderCellDef>Hora</th>
        <td mat-cell *matCellDef="let row">{{ row.startTime | date:'dd/MM/yyyy HH:mm' }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let row">{{ row.status }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acción</th>
        <td mat-cell *matCellDef="let row">
          <button mat-flat-button color="primary"
            *ngIf="row.status === 'CONFIRMED'"
            (click)="checkIn(row.id)">
            Check-in
          </button>
          <span *ngIf="row.status === 'PENDING'" class="text-amber-700 text-sm">
            Pendiente de confirmación
          </span>
          <span *ngIf="row.status === 'CHECKED_IN'" class="text-green-600 font-medium">
            ✓ Check-in realizado
          </span>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
