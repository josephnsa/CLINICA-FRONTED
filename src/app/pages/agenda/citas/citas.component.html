<div class="flex flex-col gap-4">
  <div class="flex justify-between items-center">
    <h2 class="text-xl font-semibold">Citas</h2>
    <button mat-flat-button color="primary" (click)="openForm()">+ Nueva cita</button>
  </div>

  <div class="flex gap-3 items-center" [formGroup]="searchForm">
    <app-patient-autocomplete-field
      class="w-full max-w-[520px]"
      label="Paciente"
      [idControl]="$any(searchForm.controls.patientId)"
    />
    <button mat-flat-button color="primary" (click)="onSearch()">Buscar</button>
  </div>

  <table mat-table [dataSource]="appointments" class="w-full">
    <ng-container matColumnDef="patientName">
      <th mat-header-cell *matHeaderCellDef>Paciente</th>
      <td mat-cell *matCellDef="let row">{{ row.patientName }}</td>
    </ng-container>
    <ng-container matColumnDef="doctorName">
      <th mat-header-cell *matHeaderCellDef>Doctor</th>
      <td mat-cell *matCellDef="let row">{{ row.doctorName }}</td>
    </ng-container>
    <ng-container matColumnDef="startTime">
      <th mat-header-cell *matHeaderCellDef>Inicio</th>
      <td mat-cell *matCellDef="let row">{{ row.startTime | date:'dd/MM/yyyy HH:mm' }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span class="text-sm px-2 py-1 rounded" [ngClass]="getStatusColor(row.status)">
          {{ row.status }}
        </span>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <button mat-button color="warn" (click)="cancelAppointment(row.id)"
          *ngIf="row.status !== 'CANCELLED' && row.status !== 'ATTENDED'">
          Cancelar
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-card *ngIf="showForm">
    <mat-card-title>Nueva cita</mat-card-title>
    <mat-card-content>
      <form [formGroup]="createForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
        <app-patient-autocomplete-field
          label="Paciente"
          [idControl]="$any(createForm.controls.patientId)"
        />
        <app-doctor-autocomplete-field
          label="Doctor"
          [idControl]="$any(createForm.controls.doctorId)"
        />
        <app-service-autocomplete-field
          label="Servicio"
          [idControl]="$any(createForm.controls.serviceId)"
        />
        <app-sede-autocomplete-field
          label="Sede"
          [idControl]="$any(createForm.controls.sedeId)"
        />
        <app-date-picker-field label="Día de inicio" [control]="createForm.controls.startDate" />
        <app-time-picker-field label="Hora inicio" [control]="createForm.controls.startTime" />
        <app-date-picker-field label="Día de fin" [control]="createForm.controls.endDate" />
        <app-time-picker-field label="Hora fin" [control]="createForm.controls.endTime" />
        <mat-form-field appearance="outline" class="md:col-span-2">
          <mat-label>Notas</mat-label>
          <input matInput formControlName="notes" />
        </mat-form-field>
      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button (click)="cancel()">Cancelar</button>
      <button mat-flat-button color="primary" (click)="save()" [disabled]="isSaving">Guardar</button>
    </mat-card-actions>
  </mat-card>
</div>
