<div class="flex flex-col gap-4">
  <h2 class="text-xl font-semibold">Consulta</h2>

  <div class="flex gap-3 items-center" [formGroup]="searchForm">
    <mat-form-field appearance="outline">
      <mat-label>Patient ID</mat-label>
      <input matInput formControlName="patientId" />
    </mat-form-field>
    <button mat-flat-button color="primary" (click)="onSearch()">Buscar</button>
  </div>

  <table mat-table [dataSource]="appointments" class="w-full">
    <ng-container matColumnDef="patientName">
      <th mat-header-cell *matHeaderCellDef>Paciente</th>
      <td mat-cell *matCellDef="let row">{{ row.patientName }}</td>
    </ng-container>
    <ng-container matColumnDef="startTime">
      <th mat-header-cell *matHeaderCellDef>Hora</th>
      <td mat-cell *matCellDef="let row">{{ row.startTime | date:'dd/MM/yyyy HH:mm' }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">{{ row.status }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acción</th>
      <td mat-cell *matCellDef="let row" class="flex gap-2 py-2">
        <button mat-flat-button color="primary"
          *ngIf="row.status === 'CHECKED_IN'"
          (click)="startConsultation(row.id)">
          Iniciar consulta
        </button>
        <button mat-flat-button color="accent"
          *ngIf="row.status === 'IN_PROGRESS'"
          (click)="complete(row.id)">
          Completar
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
