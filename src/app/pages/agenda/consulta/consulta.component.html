<div class="hci-mod hc-page flex flex-col gap-5">
  <header class="hci-mod__hero">
    <div class="hci-mod__titles">
      <h1 class="hci-mod__title">Consulta</h1>
      <p class="hci-mod__subtitle">Busca citas por paciente y gestiona el flujo de atención en consultorio.</p>
    </div>
  </header>

  <div class="hci-mod__filters module-filter-bar" [formGroup]="searchForm">
    <div class="filter-row hci-mod__filter-row flex flex-wrap gap-3 items-center">
      <app-patient-autocomplete-field
        class="min-w-[280px] flex-1"
        label="Paciente"
        [idControl]="$any(searchForm.controls.patientId)"
      />
      <button mat-flat-button color="primary" (click)="onSearch()">Buscar</button>
    </div>
  </div>

  <div class="hci-mod-table-wrap module-table-wrap">
    <table mat-table [dataSource]="appointments" class="w-full">
      <ng-container matColumnDef="patientName">
        <th mat-header-cell *matHeaderCellDef>Paciente</th>
        <td mat-cell *matCellDef="let row">{{ displayPatientName(row) }}</td>
      </ng-container>
      <ng-container matColumnDef="startTime">
        <th mat-header-cell *matHeaderCellDef>Hora</th>
        <td mat-cell *matCellDef="let row">{{ row.startTime | date:'dd/MM/yyyy HH:mm' }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let row">
          <span class="rounded-full bg-gray-100 px-2 py-1 text-xs font-medium text-gray-700">
            {{ row.status }}
          </span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Accion</th>
        <td mat-cell *matCellDef="let row" class="py-2">
          <div class="flex flex-wrap gap-2">
            <button mat-flat-button color="primary"
              *ngIf="row.status === 'CHECKED_IN'"
              (click)="startConsultation(row.id)">
              Iniciar consulta
            </button>
            <button mat-flat-button color="accent"
              *ngIf="row.status === 'IN_PROGRESS'"
              (click)="complete(row.id)">
              Completar
            </button>
            <span *ngIf="row.status !== 'CHECKED_IN' && row.status !== 'IN_PROGRESS'" class="text-sm text-gray-500">
              Sin accion disponible
            </span>
          </div>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <div *ngIf="!appointments.length" class="px-4 py-6 text-center text-sm text-gray-500">
      No hay atenciones para mostrar con el filtro actual.
    </div>
  </div>
</div>
