<div class="flex flex-col gap-4">
  <h2 class="text-xl font-semibold">Triaje</h2>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="triageForm" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
        <app-patient-autocomplete-field
          label="Paciente"
          [idControl]="$any(triageForm.controls.patientId)"
        />
        <app-appointment-autocomplete-field
          label="Cita"
          [appointmentIdControl]="$any(triageForm.controls.appointmentId)"
          [patientId]="triageForm.controls.patientId.value"
        />
        <mat-form-field appearance="outline">
          <mat-label>Presión arterial</mat-label>
          <input matInput formControlName="bloodPressure" placeholder="120/80" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>FC (lat/min)</mat-label>
          <input matInput type="number" formControlName="heartRate" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>FR (resp/min)</mat-label>
          <input matInput type="number" formControlName="respiratoryRate" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Temperatura °C</mat-label>
          <input matInput type="number" formControlName="temperature" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Sat O2 %</mat-label>
          <input matInput type="number" formControlName="oxygenSaturation" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Peso (kg)</mat-label>
          <input matInput type="number" formControlName="weight" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Talla (cm)</mat-label>
          <input matInput type="number" formControlName="height" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Nivel de triaje</mat-label>
          <mat-select formControlName="triageLevel">
            <mat-option value="EMERGENCY">EMERGENCY</mat-option>
            <mat-option value="URGENT">URGENT</mat-option>
            <mat-option value="NORMAL">NORMAL</mat-option>
            <mat-option value="LOW">LOW</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" class="md:col-span-2">
          <mat-label>Notas</mat-label>
          <input matInput formControlName="notes" />
        </mat-form-field>
      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-flat-button color="primary" (click)="save()" [disabled]="isSaving">
        Registrar triaje
      </button>
    </mat-card-actions>
  </mat-card>

  <div *ngIf="triageResult" class="p-4 rounded mt-2"
    [ngClass]="triageResult.critical ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'">
    <strong>{{ triageResult.critical ? '⚠️ CRÍTICO' : '✓ Normal' }}</strong>
    — Nivel: {{ triageResult.triageLevel }} | IMC: {{ triageResult.bmi }}
  </div>
</div>
