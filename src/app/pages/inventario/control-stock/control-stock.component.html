<div class="flex flex-col gap-4">

  <div class="flex items-center justify-between">
    <h3 class="text-lg font-medium">Control de stock</h3>
    <button mat-flat-button color="primary" (click)="openForm()">
      + Registrar movimiento
    </button>
  </div>

  <mat-card *ngIf="showForm">
    <mat-card-title>Nuevo movimiento</mat-card-title>
    <mat-card-content>
      <form [formGroup]="movementForm" class="flex flex-col gap-4 mt-4">

        <mat-form-field appearance="outline">
          <mat-label>Medicamento</mat-label>
          <mat-select formControlName="medicationId">
            <mat-option *ngFor="let m of medications" [value]="m.id">
              {{ m.genericName }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Tipo</mat-label>
          <mat-select formControlName="type">
            <mat-option *ngFor="let t of types" [value]="t">{{ t }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Cantidad</mat-label>
          <input matInput type="number" formControlName="quantity" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Notas</mat-label>
          <textarea matInput formControlName="notes" rows="2"></textarea>
        </mat-form-field>

      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button (click)="cancel()">Cancelar</button>
      <button mat-flat-button color="primary" (click)="save()" [disabled]="movementForm.invalid">
        Guardar
      </button>
    </mat-card-actions>
  </mat-card>

</div>
