<div class="hci-mod hc-page flex flex-col gap-5">

  <header class="hci-mod__hero hci-mod__hero--pharmacy">
    <div class="hci-mod__titles">
      <h1 class="hci-mod__title">Compras a proveedores</h1>
      <p class="hci-mod__subtitle">Órdenes de compra, aprobación y recepción de mercancía.</p>
    </div>
    <button mat-flat-button color="primary" class="hci-mod__cta" type="button" (click)="openForm()">
      <mat-icon>add</mat-icon>
      Nueva orden
    </button>
  </header>

  <div class="hci-mod-table-wrap module-table-wrap">
    <table mat-table [dataSource]="orders" class="w-full">

    <ng-container matColumnDef="supplierName">
      <th mat-header-cell *matHeaderCellDef>Proveedor</th>
      <td mat-cell *matCellDef="let row">{{ row.supplierName ?? row.supplierId }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span [ngClass]="{
          'text-yellow-600': row.status === 'PENDING',
          'text-blue-600':   row.status === 'APPROVED',
          'text-green-600':  row.status === 'RECEIVED',
          'text-red-600':    row.status === 'CANCELLED'
        }">{{ row.status }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let row">{{ row.createdAt | date:'dd/MM/yyyy' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <button mat-button color="primary"
          *ngIf="row.status === 'PENDING'"
          (click)="approve(row)">
          Aprobar
        </button>
        <button mat-button color="primary"
          *ngIf="row.status === 'APPROVED'"
          (click)="receive(row)">
          Recibir
        </button>
        <button mat-button color="warn"
          *ngIf="row.status === 'PENDING' || row.status === 'APPROVED'"
          (click)="cancel(row)">
          Cancelar
        </button>
      </td>
    </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <div *ngIf="!orders.length" class="px-4 py-6 text-center text-sm text-gray-500">
      No hay ordenes de compra registradas.
    </div>
  </div>

  <mat-card *ngIf="showForm" class="mt-1 rounded-xl border border-blue-100 shadow-sm">
    <mat-card-header class="bg-blue-50">
      <mat-card-title class="text-blue-900">Nueva orden de compra</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="orderForm" class="flex flex-col gap-4 mt-4">
        <mat-form-field appearance="outline">
          <mat-label>Proveedor</mat-label>
          <mat-select formControlName="supplierId">
            <mat-option *ngFor="let s of suppliers" [value]="s.id">{{ s.name }}</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Notas</mat-label>
          <textarea matInput formControlName="notes" rows="2"></textarea>
        </mat-form-field>
      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button (click)="cancelForm()">Cancelar</button>
      <button mat-flat-button color="primary" (click)="save()" [disabled]="orderForm.invalid">
        Guardar
      </button>
    </mat-card-actions>
  </mat-card>

</div>
