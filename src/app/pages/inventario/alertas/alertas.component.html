<div class="flex flex-col gap-4">

  <h3 class="text-lg font-medium">Alertas de stock y vencimiento</h3>

  <p class="text-sm text-gray-500" *ngIf="alerts.length === 0">
    No hay alertas de stock bajo en este momento.
  </p>

  <table mat-table [dataSource]="alerts" class="w-full" *ngIf="alerts.length > 0">

    <ng-container matColumnDef="medicationName">
      <th mat-header-cell *matHeaderCellDef>Medicamento</th>
      <td mat-cell *matCellDef="let row">{{ row.medicationName }}</td>
    </ng-container>

    <ng-container matColumnDef="currentStock">
      <th mat-header-cell *matHeaderCellDef>Stock actual</th>
      <td mat-cell *matCellDef="let row">
        <span class="text-red-600 font-semibold">{{ row.currentStock }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="minStock">
      <th mat-header-cell *matHeaderCellDef>Stock mínimo</th>
      <td mat-cell *matCellDef="let row">{{ row.minStock }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

</div>
