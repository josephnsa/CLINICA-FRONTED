<div class="flex flex-col gap-5">
  <div class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
    <h2 class="text-xl font-semibold text-gray-900">Inventario - Alertas</h2>
    <p class="text-sm text-gray-500">Monitorea alertas de stock bajo y riesgo operativo.</p>
  </div>

  <div class="overflow-hidden rounded-xl border border-red-200 bg-red-50/40 shadow-sm" *ngIf="alerts.length > 0">
    <table mat-table [dataSource]="alerts" class="w-full">

    <ng-container matColumnDef="medicationName">
      <th mat-header-cell *matHeaderCellDef>Medicamento</th>
      <td mat-cell *matCellDef="let row">{{ row.medicationName }}</td>
    </ng-container>

    <ng-container matColumnDef="currentStock">
      <th mat-header-cell *matHeaderCellDef>Stock actual</th>
      <td mat-cell *matCellDef="let row">
        <span class="text-red-600 font-semibold">{{ row.currentStock }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="minStock">
      <th mat-header-cell *matHeaderCellDef>Stock mínimo</th>
      <td mat-cell *matCellDef="let row">{{ row.minStock }}</td>
    </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <div class="rounded-xl border border-gray-200 bg-white px-4 py-8 text-center text-sm text-gray-500 shadow-sm" *ngIf="alerts.length === 0">
    No hay alertas de stock bajo en este momento.
  </div>

</div>
