<div class="flex flex-col gap-4">
  <div class="flex flex-wrap items-center gap-4" [formGroup]="filtersForm">
    <mat-form-field appearance="outline" class="min-w-[220px]">
      <mat-label>Acción / módulo</mat-label>
      <input
        matInput
        placeholder="Ej. LOGIN, INVENTARIO_CREATE..."
        formControlName="action"
        (keyup.enter)="onSearch()"
      />
    </mat-form-field>

    <span class="flex-auto"></span>

    <button mat-stroked-button color="primary" (click)="onSearch()">
      Buscar
    </button>
  </div>

  <table mat-table [dataSource]="logs" class="w-full">
    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Fecha / hora</th>
      <td mat-cell *matCellDef="let row">{{ row.createdAt | date:'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="module">
      <th mat-header-cell *matHeaderCellDef>Módulo</th>
      <td mat-cell *matCellDef="let row">{{ row.module }}</td>
    </ng-container>

    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef>Acción</th>
      <td mat-cell *matCellDef="let row">{{ row.action }}</td>
    </ng-container>

    <ng-container matColumnDef="entityId">
      <th mat-header-cell *matHeaderCellDef>Entidad</th>
      <td mat-cell *matCellDef="let row">{{ row.entityId }}</td>
    </ng-container>

    <ng-container matColumnDef="details">
      <th mat-header-cell *matHeaderCellDef>Detalles</th>
      <td mat-cell *matCellDef="let row">{{ row.details }}</td>
    </ng-container>

    <ng-container matColumnDef="ipAddress">
      <th mat-header-cell *matHeaderCellDef>IP</th>
      <td mat-cell *matCellDef="let row">{{ row.ipAddress }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
