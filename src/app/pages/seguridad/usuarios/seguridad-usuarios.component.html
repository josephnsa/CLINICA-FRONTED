<div class="flex flex-col gap-4">
  <div class="flex flex-wrap items-center gap-4" [formGroup]="filtersForm">
    <mat-form-field appearance="outline" class="min-w-[220px]">
      <mat-label>Buscar usuario</mat-label>
      <input
        matInput
        placeholder="Nombre o email"
        formControlName="search"
        (keyup.enter)="onSearch()"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="min-w-[180px]">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="role" (selectionChange)="onSearch()">
        <mat-option value="">Todos</mat-option>
        <mat-option *ngFor="let r of roles" [value]="r.code">
          {{ r.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="min-w-[160px]">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="active" (selectionChange)="onSearch()">
        <mat-option value="">Todos</mat-option>
        <mat-option value="true">Activos</mat-option>
        <mat-option value="false">Inactivos</mat-option>
      </mat-select>
    </mat-form-field>

    <span class="flex-auto"></span>

    <button mat-flat-button color="primary" (click)="newUser()">
      Nuevo usuario
    </button>
  </div>

  <table mat-table [dataSource]="users" class="w-full">
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let row">{{ row.email }}</td>
    </ng-container>

    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let row">{{ row.fullName }}</td>
    </ng-container>

    <ng-container matColumnDef="roleName">
      <th mat-header-cell *matHeaderCellDef>Rol</th>
      <td mat-cell *matCellDef="let row">{{ row.roleName }}</td>
    </ng-container>

    <ng-container matColumnDef="sedes">
      <th mat-header-cell *matHeaderCellDef>Sedes</th>
      <td mat-cell *matCellDef="let row">
        {{ row.sedes?.join(', ') }}
      </td>
    </ng-container>

    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span [ngClass]="row.active ? 'text-green-600' : 'text-red-600'">
          {{ row.active ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <button mat-button color="primary" (click)="editUser(row)">Editar</button>
        <button mat-button (click)="manageRoles(row)">Roles / Permisos</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
