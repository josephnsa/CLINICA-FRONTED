<div class="min-h-screen w-full flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50 p-4">

  <!-- Card login centrada y responsive -->
  <div class="w-full max-w-sm">
    <mat-card class="cardWithShadow rounded-2xl overflow-hidden">
      <mat-card-content class="p-8 sm:p-10">

        <!-- Branding -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary mb-4">
            <mat-icon class="text-white" style="font-size: 32px; width: 32px; height: 32px;">
              local_hospital
            </mat-icon>
          </div>
          <h1 class="text-2xl font-bold text-gray-800 leading-tight">Sistema de Salud Integral</h1>
          <p class="text-sm text-gray-500 mt-2">Panel de administración clínico</p>
        </div>

        <!-- Google Sign-In button -->
        <div #googleBtn class="w-full flex justify-center items-center min-h-[44px]"></div>

        <!-- Spinner mientras procesa -->
        @if(isLoading) {
          <div class="flex justify-center mt-5">
            <mat-spinner [diameter]="28"></mat-spinner>
          </div>
        }

      </mat-card-content>
    </mat-card>

    <p class="text-center text-xs text-gray-400 mt-4">
      Acceso exclusivo para personal autorizado
    </p>
  </div>

</div>
