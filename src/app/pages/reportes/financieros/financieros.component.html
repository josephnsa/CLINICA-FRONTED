<div class="flex flex-col gap-4">
  <h2 class="text-xl font-semibold">Reportes Financieros</h2>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="filterForm" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
        <mat-form-field appearance="outline">
          <mat-label>Sede ID</mat-label>
          <input matInput formControlName="sedeId" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Fecha inicio</mat-label>
          <input matInput formControlName="startDate" placeholder="YYYY-MM-DD" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Fecha fin</mat-label>
          <input matInput formControlName="endDate" placeholder="YYYY-MM-DD" />
        </mat-form-field>
      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-flat-button color="primary" (click)="generate()" [disabled]="isLoading">
        {{ isLoading ? 'Generando...' : 'Generar reporte' }}
      </button>
    </mat-card-actions>
  </mat-card>

  <div *ngIf="report" class="flex flex-col gap-4">
    <div class="grid grid-cols-3 gap-4">
      <mat-card class="text-center">
        <mat-card-content>
          <div class="text-3xl font-bold text-green-600">S/ {{ report.totalRevenue }}</div>
          <div class="text-sm text-gray-500 mt-1">Total ingresos</div>
        </mat-card-content>
      </mat-card>
      <mat-card class="text-center">
        <mat-card-content>
          <div class="text-3xl font-bold text-blue-600">{{ report.totalInvoices }}</div>
          <div class="text-sm text-gray-500 mt-1">Total facturas</div>
        </mat-card-content>
      </mat-card>
      <mat-card class="text-center">
        <mat-card-content>
          <div class="text-3xl font-bold text-red-600">S/ {{ report.totalRefunds }}</div>
          <div class="text-sm text-gray-500 mt-1">Total reembolsos</div>
        </mat-card-content>
      </mat-card>
    </div>

    <mat-card>
      <mat-card-title class="p-4">Por Método de Pago</mat-card-title>
      <mat-card-content>
        <table mat-table [dataSource]="report.byPaymentMethod" class="w-full">
          <ng-container matColumnDef="method">
            <th mat-header-cell *matHeaderCellDef>Método</th>
            <td mat-cell *matCellDef="let row">{{ row.method }}</td>
          </ng-container>
          <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef>Monto</th>
            <td mat-cell *matCellDef="let row">S/ {{ row.amount }}</td>
          </ng-container>
          <ng-container matColumnDef="count">
            <th mat-header-cell *matHeaderCellDef>Transacciones</th>
            <td mat-cell *matCellDef="let row">{{ row.count }}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="['method','amount','count']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['method','amount','count']"></tr>
        </table>
      </mat-card-content>
    </mat-card>
  </div>
</div>
