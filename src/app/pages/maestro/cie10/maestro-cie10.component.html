<div class="hci-mod hc-page flex flex-col gap-5">
  <header class="hci-mod__hero">
    <div class="hci-mod__titles">
      <h1 class="hci-mod__title">CIE-10 / Diagnósticos</h1>
      <p class="hci-mod__subtitle">Búsqueda por código o descripción del catálogo de diagnósticos.</p>
    </div>
  </header>

  <div class="hci-mod__filters module-filter-bar" [formGroup]="filtersForm">
    <div class="filter-row hci-mod__filter-row flex flex-wrap items-end gap-4">
    <mat-form-field appearance="outline">
      <mat-label>Código</mat-label>
      <input
        matInput
        placeholder="Ej. I10"
        formControlName="code"
        (keyup.enter)="onSearch()"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="grow">
      <mat-label>Descripción</mat-label>
      <input
        matInput
        placeholder="Hipertensión, diabetes..."
        formControlName="q"
        (keyup.enter)="onSearch()"
      />
    </mat-form-field>

    <button mat-flat-button color="primary" (click)="onSearch()">
      Buscar
    </button>
    </div>
  </div>

  <div class="hci-mod-table-wrap module-table-wrap">
  <table mat-table [dataSource]="diagnoses" class="w-full">
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Código</th>
        <td mat-cell *matCellDef="let row">{{ row.code }}</td>
      </ng-container>
  
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let row">{{ row.description }}</td>
      </ng-container>
  
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Categoría</th>
        <td mat-cell *matCellDef="let row">{{ row.category }}</td>
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
