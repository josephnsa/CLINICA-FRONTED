<div class="flex flex-col gap-4">
  <div class="flex items-center gap-4" [formGroup]="filtersForm">
    <mat-form-field appearance="outline" class="grow">
      <mat-label>Buscar medicamento</mat-label>
      <input
        matInput
        placeholder="Código, genérico o comercial"
        formControlName="search"
        (keyup.enter)="onSearch()"
      />
    </mat-form-field>

    <mat-checkbox formControlName="onlyActive" (change)="onSearch()">
      Solo activos
    </mat-checkbox>

    <button mat-flat-button color="primary">
      Nuevo medicamento
    </button>
  </div>

  <table mat-table [dataSource]="medications" class="w-full">
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Código</th>
      <td mat-cell *matCellDef="let row">{{ row.code }}</td>
    </ng-container>

    <ng-container matColumnDef="genericName">
      <th mat-header-cell *matHeaderCellDef>Nombre genérico</th>
      <td mat-cell *matCellDef="let row">{{ row.genericName }}</td>
    </ng-container>

    <ng-container matColumnDef="tradeName">
      <th mat-header-cell *matHeaderCellDef>Nombre comercial</th>
      <td mat-cell *matCellDef="let row">{{ row.tradeName }}</td>
    </ng-container>

    <ng-container matColumnDef="presentation">
      <th mat-header-cell *matHeaderCellDef>Presentación</th>
      <td mat-cell *matCellDef="let row">{{ row.presentation }}</td>
    </ng-container>

    <ng-container matColumnDef="unit">
      <th mat-header-cell *matHeaderCellDef>Unidad</th>
      <td mat-cell *matCellDef="let row">{{ row.unit }}</td>
    </ng-container>

    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span [ngClass]="row.active ? 'text-green-600' : 'text-red-600'">
          {{ row.active ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <button mat-button color="primary">
          Editar
        </button>
        <button mat-button color="warn" (click)="toggleActiveLocal(row)">
          {{ row.active ? 'Desactivar' : 'Activar' }}
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
