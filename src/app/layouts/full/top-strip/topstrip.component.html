<div class="app-topstrip fixed top-0 left-0 z-10 w-full text-white py-2.5 px-5 flex items-center justify-between"
     style="background: linear-gradient(90deg, #0d2e6e 0%, #1a56b0 100%);">

  <!-- ── Branding izquierdo ── -->
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center flex-shrink-0">
      <mat-icon style="font-size:18px;width:18px;height:18px" class="text-white">local_hospital</mat-icon>
    </div>
    <div class="flex flex-col leading-tight">
      <span class="font-bold text-sm tracking-wide">Clínica Yoselin</span>
      <span class="text-[10px] text-blue-300 hidden sm:block">Sistema de Gestión Integral</span>
    </div>
  </div>

  <!-- ── Usuario + logout derecho ── -->
  <div class="flex items-center gap-3">
    @if (currentUser) {
      <div class="hidden md:flex items-center gap-2">
        <mat-icon style="font-size:16px;width:16px;height:16px" class="text-blue-300">person</mat-icon>
        <span class="text-sm text-blue-100 font-medium">{{ currentUser.fullName }}</span>
        <span class="bg-white/20 text-white text-[10px] px-2 py-0.5 rounded-full font-semibold uppercase tracking-wider">
          {{ currentUser.role }}
        </span>
      </div>
    }

    <button
      mat-icon-button
      (click)="logout()"
      class="sm:hidden !text-white hover:!bg-white/10"
      title="Cerrar sesión">
      <mat-icon>logout</mat-icon>
    </button>
    <button
      mat-stroked-button
      (click)="logout()"
      class="hidden sm:flex !text-white !border-white/30 !text-xs hover:!bg-white/10 !min-h-0 !h-8 !px-3">
      <mat-icon class="!text-base !w-4 !h-4 mr-1">logout</mat-icon>
      Cerrar sesión
    </button>
  </div>

</div>
