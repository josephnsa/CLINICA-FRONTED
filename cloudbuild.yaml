steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-build"
    args:
      - "build"
      - "--cache-from"
      - "us-central1-docker.pkg.dev/pe-axelior-clinapp-dev/clinica-backend/salud-frontend:latest"
      - "-t"
      - "us-central1-docker.pkg.dev/pe-axelior-clinapp-dev/clinica-backend/salud-frontend:$COMMIT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/pe-axelior-clinapp-dev/clinica-backend/salud-frontend:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "docker-push-sha"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/pe-axelior-clinapp-dev/clinica-backend/salud-frontend:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: "docker-push-latest"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/pe-axelior-clinapp-dev/clinica-backend/salud-frontend:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "cloud-run-deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "salud-frontend"
      - "--image=us-central1-docker.pkg.dev/pe-axelior-clinapp-dev/clinica-backend/salud-frontend:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--port=8080"
      - "--memory=256Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=3"
      - "--concurrency=200"
      - "--timeout=30s"
      - "--allow-unauthenticated"
      - "--service-account=clinica-backend-sa@pe-axelior-clinapp-dev.iam.gserviceaccount.com"

timeout: "900s"

options:
  logging: CLOUD_LOGGING_ONLY
