steps:
  - name: "node:20-alpine"
    id: "npm-ci"
    entrypoint: "npm"
    args: ["ci", "--legacy-peer-deps"]

  - name: "node:20-alpine"
    id: "build-angular"
    entrypoint: "npm"
    args: ["run", "build", "--", "--configuration", "production"]

  - name: "node:20-alpine"
    id: "deploy-firebase-hosting"
    entrypoint: "sh"
    args:
      - "-c"
      - "npm i -g firebase-tools && firebase deploy --project pe-axelior-clinapp-dev --only hosting --non-interactive"

timeout: "900s"

options:
  logging: CLOUD_LOGGING_ONLY
